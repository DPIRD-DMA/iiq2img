name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy iiq2img/

      - name: Test
        run: uv run pytest tests/ -x -q --ignore=tests/test_pipeline_parity.py
